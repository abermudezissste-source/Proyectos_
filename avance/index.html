<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Tracking Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/2.9.4/Chart.min.js"></script>
</head>
<body>
    <header>
        <h1>Progress Tracking Dashboard</h1>
    </header>
    <main>
        <section id="charts">
            <canvas id="myChart"></canvas>
        </section>
        <section id="statistics">
            <h2>Statistics</h2>
            <p>Current Task Completion: <span id="completion-rate">75%</span></p>
            <p>Total Tasks: <span id="total-tasks">20</span></p>
            <p>Completed Tasks: <span id="completed-tasks">15</span></p>
        </section>
        <section id="progress-bars">
            <h2>Progress Bars</h2>
            <div class="progress">
                <div class="progress-bar" style="width: 75%;">75%</div>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Your Company. All rights reserved.</p>
    </footer>
    <script>
        var ctx = document.getElementById('myChart').getContext('2d');
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Task 1', 'Task 2', 'Task 3'],
                datasets: [{
                    label: 'Task Completion',
                    data: [75, 50, 100],
                    backgroundColor: ['rgba(75, 192, 192, 0.2)', 'rgba(153, 102, 255, 0.2)', 'rgba(255, 159, 64, 0.2)'],
                    borderColor: ['rgba(75, 192, 192, 1)', 'rgba(153, 102, 255, 1)', 'rgba(255, 159, 64, 1)'],
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });
    </script>
</body>
</html>
